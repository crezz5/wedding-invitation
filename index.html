<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Boarding Pass</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Barcode+128&family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --airline-blue: #1e272e;
            --accent-gold: #d4af37;
            --paper: #ffffff;
            --bg: #d1d8e0;
        }

        body {
            background-color: var(--bg);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .ticket-container {
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.2));
            width: 100%;
            max-width: 850px;
        }

        .boarding-pass {
            background: var(--paper);
            display: flex;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #aaa;
        }

        /* Main Pass */
        .main-section {
            flex: 2.5;
            padding: 35px;
            border-right: 2px dashed #ccc;
            position: relative;
        }

        /* Stub Section */
        .stub-section {
            flex: 1;
            padding: 35px;
            background: #fcfcfc;
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--airline-blue);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .logo {
            font-weight: 900;
            font-size: 24px;
            letter-spacing: 1px;
            color: var(--airline-blue);
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        .value {
            font-size: 17px;
            font-weight: bold;
            color: #333;
        }

        /* Flight Icon/Path */
        .path {
            display: flex;
            align-items: center;
            margin: 25px 0;
        }

        .path-line {
            flex: 1;
            height: 2px;
            background: repeating-linear-gradient(90deg, #ccc, #ccc 5px, transparent 5px, transparent 10px);
        }

        .plane-icon { font-size: 22px; margin: 0 15px; transform: rotate(45deg); }

        .barcode {
            font-family: 'Libre Barcode 128', cursive;
            font-size: 65px;
            margin-top: 25px;
            display: block;
            color: #000;
        }

        /* Forms */
        select, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
        }

        .btn {
            background: var(--airline-blue);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.3s ease;
        }

        .btn:hover { background: var(--accent-gold); color: #000; }

        @media (max-width: 700px) {
            .boarding-pass { flex-direction: column; }
            .main-section { border-right: none; border-bottom: 2px dashed #ccc; }
        }
    </style>
</head>
<body>

<div class="ticket-container">
    <div class="boarding-pass">
        <!-- Main Section -->
        <div class="main-section">
            <div class="header">
                <div class="logo">LOVE AIRLINES</div>
                <div style="font-size: 10px; font-weight: bold; color: var(--accent-gold);">FIRST CLASS</div>
            </div>

            <div class="info-grid">
                <div>
                    <span class="label">Passenger</span>
                    <span class="value">A Valued Guest</span>
                </div>
                <div>
                    <span class="label">Seat</span>
                    <span class="value">Row 01A</span>
                </div>
            </div>

            <div class="path">
                <div style="text-align: center;">
                    <div class="value" style="font-size: 24px;">SGL</div>
                    <span class="label">Singlehood</span>
                </div>
                <div class="path-line"></div>
                <div class="plane-icon">✈️</div>
                <div class="path-line"></div>
                <div style="text-align: center;">
                    <div class="value" style="font-size: 24px;">MRG</div>
                    <span class="label">Marriage</span>
                </div>
            </div>

            <div class="info-grid">
                <div>
                    <span class="label">Date</span>
                    <span class="value">August 24, 2026</span>
                </div>
                <div>
                    <span class="label">Boarding Time</span>
                    <span class="value">05:30 PM</span>
                </div>
                <div>
                    <span class="label">Gate</span>
                    <span class="value">The Crystal Palace</span>
                </div>
                <div>
                    <span class="label">Flight No.</span>
                    <span class="value">WED-2026</span>
                </div>
            </div>

            <div class="barcode">WEDDINGINVITATION2026</div>
        </div>

        <!-- Stub Section -->
        <div class="stub-section">
            <div class="label" style="margin-bottom: 20px;">Confirm Attendance</div>
            
            <form action="" method="POST">
                <label class="label">Check-In Status</label>
                <select name="status">
                    <option value="Yes">Ready for Boarding</option>
                    <option value="No">Flight Cancelled</option>
                </select>

                <label class="label" style="margin-top: 15px; display: block;">Meal Selection</label>
                <select name="meal">
                    <option>Standard (Meat)</option>
                    <option>Vegetarian</option>
                    <option>No Preference</option>
                </select>

                <button type="submit" class="btn">CHECK-IN NOW</button>
            </form>

            <div style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px;">
                <span class="label">Ticket Status</span>
                <span class="value" style="font-size: 12px; color: #27ae60;">VALID</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
