<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation | Boarding Pass</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Barcode+128&family=Montserrat:wght@400;700;900&display=swap');

        :root {
            --airline-blue: #1e272e;
            --accent-gold: #d4af37;
            --paper: #ffffff;
            --bg: #d1d8e0;
        }

        body {
            background-color: var(--bg);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .ticket-container {
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.2));
            width: 100%;
            max-width: 850px;
        }

        .boarding-pass {
            background: var(--paper);
            display: flex;
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid #aaa;
        }

        /* Left Side: Main Ticket */
        .main-section {
            flex: 2.5;
            padding: 35px;
            border-right: 2px dashed #ccc;
            position: relative;
        }

        /* Right Side: Stub */
        .stub-section {
            flex: 1;
            padding: 35px;
            background: #fcfcfc;
            text-align: center;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--airline-blue);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .logo { font-weight: 900; font-size: 24px; color: var(--airline-blue); }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        .value { font-size: 17px; font-weight: bold; color: #333; }

        /* Path Graphics */
        .path { display: flex; align-items: center; margin: 25px 0; }
        .path-line { flex: 1; height: 2px; background: repeating-linear-gradient(90deg, #ccc, #ccc 5px, transparent 5px, transparent 10px); }
        .plane-icon { font-size: 22px; margin: 0 15px; transform: rotate(45deg); }

        /* Countdown Style */
        .countdown-container {
            margin-top: 25px;
            padding: 15px;
            background: var(--airline-blue);
            border-radius: 10px;
            text-align: center;
        }

        #countdown {
            color: var(--accent-gold);
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 20px;
            letter-spacing: 2px;
        }

        .barcode {
            font-family: 'Libre Barcode 128', cursive;
            font-size: 60px;
            margin-top: 25px;
            display: block;
            color: #000;
        }

        /* RSVP Form */
        input, select, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-family: inherit;
        }

        .btn {
            background: var(--airline-blue);
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            margin-top: 25px;
            transition: 0.3s ease;
        }

        .btn:hover { background: var(--accent-gold); color: #1e272e; }

        @media (max-width: 700px) {
            .boarding-pass { flex-direction: column; }
            .main-section { border-right: none; border-bottom: 2px dashed #ccc; }
        }
    </style>
</head>
<body>

<div class="ticket-container">
    <div class="boarding-pass">
        <!-- Main Section -->
        <div class="main-section">
            <div class="header">
                <div class="logo">LOVE AIRWAYS ✈️</div>
                <div style="font-size: 10px; font-weight: bold; color: var(--accent-gold);">FIRST CLASS</div>
            </div>

            <div class="info-grid">
                <div>
                    <span class="label">Passenger</span>
                    <span class="value">Our Favorite Guest</span>
                </div>
                <div>
                    <span class="label">Flight No.</span>
                    <span class="value">LOVE-2026</span>
                </div>
            </div>

            <div class="path">
                <div style="text-align: center;">
                    <div class="value" style="font-size: 24px;">SGL</div>
                    <span class="label">Singlehood</span>
                </div>
                <div class="path-line"></div>
                <div class="plane-icon">🛫</div>
                <div class="path-line"></div>
                <div style="text-align: center;">
                    <div class="value" style="font-size: 24px;">MRG</div>
                    <span class="label">Marriage</span>
                </div>
            </div>

            <div class="info-grid">
                <div>
                    <span class="label">Gate / Venue</span>
                    <span class="value">Dewan USAS</span>
                </div>
                <div>
                    <span class="label">Boarding Time</span>
                    <span class="value">10:00 AM</span>
                </div>
            </div>

            <!-- LIVE COUNTDOWN -->
            <div class="countdown-container">
                <div class="label" style="color: white; opacity: 0.7;">Time Until Boarding</div>
                <div id="countdown">Calculating...</div>
            </div>

            <div class="barcode">WEDDINGINVITATION2026</div>
        </div>

        <!-- RSVP Stub Section -->
        <div class="stub-section">
            <div class="label" style="margin-bottom: 20px;">Passenger Check-In</div>
            
            <!-- Replace 'YOUR_FORMSPREE_ID' with your actual Formspree ID -->
            <form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
                <input type="text" name="name" placeholder="Enter Full Name" required>
                
                <label class="label" style="margin-top: 15px; display: block;">Attendance</label>
                <select name="status" required>
                    <option value="Confirmed">Ready for Boarding</option>
                    <option value="Declined">Flight Cancelled</option>
                </select>

                <label class="label" style="margin-top: 15px; display: block;">Meal Choice</label>
                <select name="meal">
                    <option value="Meat">Standard (Chicken)</option>
                    <option value="Veg">Vegetarian</option>
                </select>

                <button type="submit" class="btn">CONFIRM CHECK-IN</button>
            </form>
            
            <p style="font-size: 9px; margin-top: 20px; color: #999;">Check-in closes 1 month before departure.</p>
        </div>
    </div>
</div>

<script>
    // --- LIVE COUNTDOWN LOGIC ---
    // Change this date to your wedding date!
    var countDownDate = new Date("Dec 12, 2026 12:00:00").getTime();

    var x = setInterval(function() {
        var now = new Date().getTime();
        var distance = countDownDate - now;

        var days = Math.floor(distance / (1000 * 60 * 60 * 24));
        var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        var seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("countdown").innerHTML = days + "d " + hours + "h "
        + minutes + "m " + seconds + "s ";

        if (distance < 0) {
            clearInterval(x);
            document.getElementById("countdown").innerHTML = "WE ARE MARRIED! ✈️";
        }
    }, 1000);
</script>

</body>
</html>
